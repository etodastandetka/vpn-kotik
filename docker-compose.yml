services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: vpn
      POSTGRES_DB: vpn
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn -d vpn"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vpn:vpn@db:5432/vpn
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  bot:
    build: .
    command: python -m bot.main
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vpn:vpn@db:5432/vpn
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
