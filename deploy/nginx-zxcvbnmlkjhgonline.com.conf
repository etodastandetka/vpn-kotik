# Админка Phantom (Next.js). API тот же процесс FastAPI, но с другого домена
# ходит сервер Next через BACKEND_URL (лучше http://127.0.0.1:8000 на том же VPS).
#
# admin-web/.env.local (на сервере):
#   BACKEND_URL=http://127.0.0.1:8000
#   ADMIN_API_KEY=<тот же, что в корневом .env API>
#   ADMIN_DASHBOARD_PASSWORD=...
#   ADMIN_SESSION_SECRET=...
#
# Сертификаты: certbot certonly --nginx -d zxcvbnmlkjhgonline.com

server {
    listen 80;
    server_name zxcvbnmlkjhgonline.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zxcvbnmlkjhgonline.com;

    ssl_certificate     /etc/letsencrypt/live/zxcvbnmlkjhgonline.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zxcvbnmlkjhgonline.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
