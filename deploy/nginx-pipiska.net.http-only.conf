# ТОЛЬКО HTTP (порт 80) — пока нет сертификатов. Подключите этот файл первым,
# убедитесь что nginx -t && systemctl start nginx проходят, затем:
#   sudo certbot --nginx -d pipiska.net -d www.pipiska.net
# Certbot сам добавит HTTPS или подставьте deploy/nginx-pipiska.net.conf после certonly.

server {
    listen 80;
    server_name pipiska.net www.pipiska.net;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
