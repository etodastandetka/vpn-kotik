# Публичный API: вебхуки, /health, /sub/{token} для Happ и клиентов.
# Сертификаты: certbot certonly --nginx -d pipiska.net -d www.pipiska.net
#
# .env (FastAPI):
#   WEBHOOK_BASE_URL=https://pipiska.net
#   PUBLIC_API_BASE_URL=https://pipiska.net

server {
    listen 80;
    server_name pipiska.net www.pipiska.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pipiska.net www.pipiska.net;

    ssl_certificate     /etc/letsencrypt/live/pipiska.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pipiska.net/privkey.pem;
    # Не используем include options-ssl-nginx.conf — файла может не быть до certbot
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
